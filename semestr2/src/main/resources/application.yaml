server:
  port: 8080

app:
  name: To-Do List Manager
  version: 1.0.0

logging:
  level:
    com.example.todolist: DEBUG

---
spring:
  profiles: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/todolist_dev
    username: todolist_user
    password: todolist_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  app:
    upload:
      dir: uploads

logging:
  level:
    com.example.todolist: TRACE

---
spring:
  profiles: test

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true

  flyway:
    enabled: false

---
spring:
  profiles: prod

server:
  port: 8081

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.example.todolist: INFO