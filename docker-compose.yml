version: '3.8'

services:
  postgres:
    image: postgres:13
    container_name: todolist-postgres
    environment:
      POSTGRES_DB: todolist_dev
      POSTGRES_USER: todolist_user
      POSTGRES_PASSWORD: todolist_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: